version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis_cache
    depends_on:
      - redis_cache
    networks:
      - queueless_net

  redis_cache:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - queueless_net

volumes:
  redis_data:

networks:
  queueless_net:
    driver: bridge
