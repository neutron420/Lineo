name: Frontend CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./lineo-fe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./lineo-fe/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "dummy-key"
          NEXT_PUBLIC_GOOGLE_MAPS_KEY: "dummy-key"
