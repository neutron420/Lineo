services:
  jenkins:
    build:
      context: ..
      dockerfile: jenkins/Dockerfile
    container_name: jenkins-blueocean
    restart: always
    privileged: true
    user: root
    environment:
      - JAVA_OPTS=-Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/src/lineo:ro

volumes:
  jenkins_data:
